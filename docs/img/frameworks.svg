<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" font-family="ui-sans-serif, -apple-system, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <pattern id="dots3" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ececec"/>
    </pattern>
    <filter id="card3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.05"/>
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.04"/>
    </filter>
    <linearGradient id="g-grn3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0cce6b"/><stop offset="1" stop-color="#0aa055"/>
    </linearGradient>
    <linearGradient id="g-blu3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0070f3"/><stop offset="1" stop-color="#0058c4"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bbb"/>
    </marker>
  </defs>

  <rect width="1600" height="720" fill="#ffffff"/>
  <rect width="1600" height="720" fill="url(#dots3)" opacity="0.55"/>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <text x="60" y="60" fill="#999" font-size="11" letter-spacing="3">FRAMEWORK ADAPTER LAYER · THIS REPO IS THE PLUGIN POOL</text>
    <line x1="60" y1="76" x2="1540" y2="76" stroke="#eaeaea"/>
  </g>
  <text x="60" y="118" font-size="32" font-weight="600" fill="#0a0a0a">Any agent framework, one mobile app.</text>
  <text x="60" y="146" font-size="14" fill="#666">Drop an adapter under <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0a0a0a">plugins/&lt;framework&gt;/</tspan> — Onepilot fetches it at pair-time. No SDK to learn, no UI to build.</text>

  <!-- ===== STAGE 1: APP ===== -->
  <g transform="translate(60,210)" filter="url(#card3)">
    <rect width="320" height="380" rx="14" fill="#ffffff" stroke="#eaeaea"/>
    <text x="20" y="38" font-size="10" letter-spacing="3" fill="#999" font-family="ui-monospace, 'SF Mono', Menlo, monospace">STAGE 01 · APP</text>
    <text x="20" y="66" font-size="20" font-weight="600" fill="#0a0a0a">User pairs a server</text>
    <text x="20" y="86" font-size="12" fill="#666">In Onepilot, point at any host.</text>

    <!-- mini phone preview -->
    <g transform="translate(60,108)">
      <rect width="200" height="240" rx="22" fill="#0a0a0a"/>
      <rect x="4" y="4" width="192" height="232" rx="18" fill="#fafafa"/>
      <rect x="76" y="10" width="48" height="14" rx="7" fill="#0a0a0a"/>
      <text x="100" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#0a0a0a">Pair server</text>

      <rect x="14" y="64" width="172" height="34" rx="8" fill="#fff" stroke="#eaeaea"/>
      <text x="22" y="78" font-size="9" fill="#999" font-family="ui-monospace, 'SF Mono', Menlo, monospace">HOST</text>
      <text x="22" y="92" font-size="11" fill="#0a0a0a" font-weight="600" font-family="ui-monospace, 'SF Mono', Menlo, monospace">prod-vps.fra</text>

      <text x="22" y="116" font-size="9" fill="#999" letter-spacing="2" font-family="ui-monospace, 'SF Mono', Menlo, monospace">RUNTIME</text>
      <g transform="translate(14,124)">
        <rect width="172" height="28" rx="8" fill="#fff" stroke="#0070f3" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="4" fill="#0cce6b"/>
        <text x="26" y="18" font-size="11" font-weight="600" fill="#0a0a0a">OpenClaw</text>
        <text x="160" y="18" text-anchor="end" font-size="9" fill="#0cce6b" font-family="ui-monospace, 'SF Mono', Menlo, monospace">v1.4</text>
      </g>
      <g transform="translate(14,158)">
        <rect width="172" height="22" rx="8" fill="#fff" stroke="#eaeaea"/>
        <text x="26" y="15" font-size="11" fill="#999">Hermes</text>
        <text x="160" y="15" text-anchor="end" font-size="9" fill="#999">soon</text>
      </g>
      <g transform="translate(14,184)">
        <rect width="172" height="22" rx="8" fill="#fff" stroke="#eaeaea"/>
        <text x="26" y="15" font-size="11" fill="#999">Paperclip</text>
        <text x="160" y="15" text-anchor="end" font-size="9" fill="#999">soon</text>
      </g>

      <rect x="14" y="214" width="172" height="14" rx="7" fill="url(#g-blu3)"/>
      <text x="100" y="224" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">CONNECT</text>
    </g>
  </g>

  <!-- arrow 1 -->
  <g stroke="#bbb" stroke-width="2" fill="none">
    <line x1="385" y1="400" x2="475" y2="400" marker-end="url(#arr)"/>
    <text x="430" y="385" text-anchor="middle" font-size="10" fill="#666" font-family="ui-monospace, 'SF Mono', Menlo, monospace">fetch adapter</text>
  </g>

  <!-- ===== STAGE 2: PLUGIN POOL ===== -->
  <g transform="translate(490,210)" filter="url(#card3)">
    <rect width="540" height="380" rx="14" fill="#ffffff" stroke="#0cce6b" stroke-width="2"/>
    <rect width="540" height="40" rx="14" fill="url(#g-grn3)"/>
    <rect y="26" width="540" height="14" fill="url(#g-grn3)"/>
    <text x="20" y="26" font-size="11" fill="#fff" font-weight="700" letter-spacing="3" font-family="ui-monospace, 'SF Mono', Menlo, monospace">STAGE 02 · PUBLIC PLUGIN POOL · MIT</text>

    <text x="20" y="74" font-size="14" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0a0a0a" font-weight="600">github.com/sofiane8910/onepilotapp</text>
    <text x="20" y="92" font-size="11" fill="#666" font-family="ui-monospace, 'SF Mono', Menlo, monospace">git tag → release · auto-fetched by app · no SDK</text>

    <!-- file tree -->
    <g transform="translate(20,112)" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">
      <rect width="500" height="200" rx="10" fill="#fafafa" stroke="#eaeaea"/>
      <text x="14" y="22" fill="#999" font-size="10">▼ plugins/</text>

      <g transform="translate(28,38)">
        <rect width="472" height="46" rx="6" fill="#fff" stroke="#bbf7d0"/>
        <circle cx="14" cy="22" r="4" fill="#0cce6b"/>
        <text x="28" y="20" fill="#0a0a0a">openclaw/onepilot-channel/</text>
        <text x="28" y="36" font-size="10" fill="#666">manifest.json · adapter.ts · README.md</text>
        <rect x="408" y="11" width="58" height="22" rx="11" fill="#f0fdf4" stroke="#bbf7d0"/>
        <text x="437" y="25" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">v1.4 · LIVE</text>
      </g>

      <g transform="translate(28,92)">
        <rect width="472" height="46" rx="6" fill="#fff" stroke="#eaeaea"/>
        <circle cx="14" cy="22" r="4" fill="#d4d4d4"/>
        <text x="28" y="20" fill="#0a0a0a">hermes/onepilot-channel/</text>
        <text x="28" y="36" font-size="10" fill="#666">scaffolding · persistent-memory chat</text>
        <rect x="408" y="11" width="58" height="22" rx="11" fill="#f5f5f5" stroke="#eaeaea"/>
        <text x="437" y="25" text-anchor="middle" font-size="10" fill="#666" font-weight="600">NEXT</text>
      </g>

      <g transform="translate(28,146)">
        <rect width="472" height="46" rx="6" fill="#fff" stroke="#eaeaea"/>
        <circle cx="14" cy="22" r="4" fill="#d4d4d4"/>
        <text x="28" y="20" fill="#0a0a0a">paperclip/onepilot-channel/</text>
        <text x="28" y="36" font-size="10" fill="#666">scaffolding · agent-company dashboard</text>
        <rect x="408" y="11" width="58" height="22" rx="11" fill="#f5f5f5" stroke="#eaeaea"/>
        <text x="437" y="25" text-anchor="middle" font-size="10" fill="#666" font-weight="600">NEXT</text>
      </g>
    </g>

    <!-- release flow -->
    <g transform="translate(20,330)" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10">
      <rect width="500" height="34" rx="6" fill="#0a0a0a"/>
      <text x="14" y="14" fill="#999">$</text>
      <text x="24" y="14" fill="#fafafa">git tag openclaw/onepilot-channel@v1.4.1 &amp;&amp; git push --tags</text>
      <text x="14" y="28" fill="#0cce6b">→</text>
      <text x="24" y="28" fill="#888">CI packs the subdir, uploads tarball, app picks it up</text>
    </g>
  </g>

  <!-- arrow 2 -->
  <g stroke="#bbb" stroke-width="2" fill="none">
    <line x1="1040" y1="400" x2="1130" y2="400" marker-end="url(#arr)"/>
    <text x="1085" y="385" text-anchor="middle" font-size="10" fill="#666" font-family="ui-monospace, 'SF Mono', Menlo, monospace">runs against</text>
  </g>

  <!-- ===== STAGE 3: FRAMEWORKS ===== -->
  <g transform="translate(1140,210)">
    <text x="0" y="14" font-size="10" letter-spacing="3" fill="#999" font-family="ui-monospace, 'SF Mono', Menlo, monospace">STAGE 03 · FRAMEWORKS</text>

    <!-- OpenClaw (live) -->
    <g transform="translate(0,30)" filter="url(#card3)">
      <rect width="400" height="98" rx="12" fill="#ffffff" stroke="#0cce6b" stroke-width="1.5"/>
      <rect width="6" height="98" rx="3" fill="url(#g-grn3)"/>
      <text x="22" y="32" font-size="16" font-weight="700" fill="#0a0a0a">OpenClaw</text>
      <rect x="120" y="18" width="58" height="20" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
      <circle cx="132" cy="28" r="3" fill="#0cce6b"/>
      <text x="139" y="32" font-size="10" fill="#16a34a" font-weight="600">LIVE</text>
      <text x="22" y="54" font-size="11" fill="#666">Chat · cron · multi-agent · push alerts</text>
      <text x="22" y="78" font-size="9" fill="#999" font-family="ui-monospace, 'SF Mono', Menlo, monospace">third-party · MIT · openclaw/openclaw</text>
    </g>

    <!-- Hermes (next) -->
    <g transform="translate(0,144)" filter="url(#card3)">
      <rect width="400" height="98" rx="12" fill="#ffffff" stroke="#eaeaea"/>
      <rect width="6" height="98" rx="3" fill="#d4d4d4"/>
      <text x="22" y="32" font-size="16" font-weight="700" fill="#0a0a0a">Hermes Agent</text>
      <rect x="156" y="18" width="58" height="20" rx="10" fill="#f5f5f5" stroke="#eaeaea"/>
      <text x="185" y="32" text-anchor="middle" font-size="10" fill="#666" font-weight="600">NEXT</text>
      <text x="22" y="54" font-size="11" fill="#666">Persistent-memory chat · gateway mirror</text>
      <text x="22" y="78" font-size="9" fill="#999" font-family="ui-monospace, 'SF Mono', Menlo, monospace">hermes-agent.nousresearch.com</text>
    </g>

    <!-- Paperclip (next) -->
    <g transform="translate(0,258)" filter="url(#card3)">
      <rect width="400" height="98" rx="12" fill="#ffffff" stroke="#eaeaea"/>
      <rect width="6" height="98" rx="3" fill="#d4d4d4"/>
      <text x="22" y="32" font-size="16" font-weight="700" fill="#0a0a0a">Paperclip</text>
      <rect x="118" y="18" width="58" height="20" rx="10" fill="#f5f5f5" stroke="#eaeaea"/>
      <text x="147" y="32" text-anchor="middle" font-size="10" fill="#666" font-weight="600">NEXT</text>
      <text x="22" y="54" font-size="11" fill="#666">Agent-company dashboard · budgets · org</text>
      <text x="22" y="78" font-size="9" fill="#999" font-family="ui-monospace, 'SF Mono', Menlo, monospace">paperclipai/paperclip</text>
    </g>

    <text x="0" y="392" font-size="11" fill="#0070f3" font-family="ui-monospace, 'SF Mono', Menlo, monospace">+ open an integration issue →</text>
  </g>

  <!-- footer note -->
  <line x1="60" y1="640" x2="1540" y2="640" stroke="#eaeaea"/>
  <text x="60" y="668" font-size="12" fill="#666"><tspan font-weight="600" fill="#0a0a0a">Framework author?</tspan> Drop an adapter here · get a free iOS front-end · zero SDK to learn · MIT, fork at will.</text>
</svg>
